[supervisord]
nodaemon=true

[program:redis]
command=/usr/bin/redis-server
autostart=true
autorestart=true
stderr_logfile=/var/log/redis.err.log
stdout_logfile=/var/log/redis.out.log

[program:ai-engine]
command=uvicorn main:app --host 0.0.0.0 --port 8000
directory=/app/ai-engine
autostart=true
autorestart=true
stderr_logfile=/var/log/ai-engine.err.log
stdout_logfile=/var/log/ai-engine.out.log

[program:server]
command=npm start
directory=/app/server
autostart=true
autorestart=true
stderr_logfile=/var/log/server.err.log
stdout_logfile=/var/log/server.out.log
