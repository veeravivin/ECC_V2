services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3001:3000" # Changed external port to 3001 to avoid the conflict on 3000
    environment:
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai-engine:8000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - ai-engine
      - redis
    volumes:
      - db-data:/app/server/data

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - PORT=8000
    depends_on:
      - redis

  redis:
    image: redis:alpine
    expose:
      - "6379"

volumes:
  db-data:
